{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestia</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h6 class="sidebar-title">Datos curiosos sobre LSGT</h6>
        </div>
        <div class="fact-wrapper">
            <div class="fact-card" id="factCard">
                <p class="fact-text" id="factText"></p>
            </div>
            <div class="fact-dots" id="factDots"></div>
            <div class="countdown-box">
                <span class="countdown-text">
                    Próximo dato en <span id="countdown">10</span>s
                </span>
            </div>
        </div>
    </div>

    <div class="chat-container">
        
        {% block contenido %}
        {% endblock %}

        <div class="input-area">
            <div class="input-shell">
                <div class="input-row">
                    <input type="text" id="userInput"
                           class="message-input"
                           placeholder="Dime con qué quieres empezar"
                           aria-label="Mensaje">
                    <button class="send-button" type="button" id="sendBtn">Enviar</button>
                </div>
            </div>
        </div>
    </div>


    <script src="{% static 'js/scripts.js' %}"></script>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>

    <div class="sidebar bg-body-tertiary p-3 d-none d-md-flex flex-column gap-3">
        <div class="sidebar-header">
            <h6 class="fw-semibold text-body mb-0">Datos curiosos sobre LSGT</h6>
        </div>
        <div class="fact-wrapper flex-grow-1 d-flex flex-column justify-content-center">
            <div class="fact-card p-3 rounded-3 bg-body border border-secondary-subtle" id="factCard">
                <p class="mb-0 small text-body-secondary" id="factText"></p>
            </div>
            <div class="fact-dots d-flex justify-content-center gap-2 mt-3" id="factDots"></div>
            <div class="text-center mt-2">
                <span class="text-body-secondary" style="font-size: 0.7rem;">
                    Próximo dato en <span id="countdown">10</span>s
                </span>
            </div>
        </div>
    </div>

    <div class="chat-container bg-body">
        
        {% block contenido %}
        {% endblock %}

        <div class="input-area bg-body">
            <div class="container-fluid" style="max-width: 720px;">
                <div class="input-group">
                    <input type="text" id="userInput"
                           class="form-control form-control-lg bg-body-tertiary border-secondary-subtle"
                           placeholder="Dime con qué quieres empezar"
                           aria-label="Mensaje">
                    <button class="btn btn-primary px-4" type="button" id="sendBtn">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/scripts.js' %}"></script>
</body>
</html>

{% extends 'base.html' %}
{% load cloudinary %}

{% block contenido %}
<h2>Sección de Expresiones</h2>

{% if video_id %}
    <div class="respuesta-ia" style="text-align: center; margin-bottom: 1rem;">
        <p><strong>{{ mensaje_ia }}</strong></p>
    </div>
    <div class="videos_container">
        <div class="video_cards">
            <video controls>
                <source src="{% cloudinary_url video_id|add:'.mp4' resource_type='video' %}" type="video/mp4">
            </video>
            <span class="video_title">Resultado</span>
        </div>
    </div>

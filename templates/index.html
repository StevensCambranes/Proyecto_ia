{% extends 'base.html' %}

{% block contenido %}
<div class="chat-history hidden" id="chatHistory"></div>

<div class="welcome-view" id="welcomeView">
    <div class="welcome-header">
        <img src="/static/Logo.png" alt="Logo de GestIA" width="100" height="100">
        <h1 class="welcome-title">¡Bienvenido a <span class="accent">GestIA</span>!</h1>
        <p class="welcome-subtitle">Por el momento podemos enseñarte sobre estos 3 temas. ¿Con cuál quieres empezar?</p>
    </div>
    
    <div class="topics-grid">
        <button class="topic-card topic-btn"
                data-topic="abecedario" data-message="Quiero aprender el abecedario en lenguaje de señas">
            <div class="card-emoji"></div>
            <h5 class="topic-title">Abecedario</h5>
            <p class="topic-text">Aprende a deletrear cada letra del alfabeto con las manos.</p>
        </button>
        <button class="topic-card topic-btn"
                data-topic="colores" data-message="Quiero aprender los colores en lenguaje de señas">
            <h5 class="topic-title">Colores</h5>
            <p class="topic-text">Conoce las señas para rojo, azul, verde y muchos más colores.</p>
        </button>
        <button class="topic-card topic-btn"
                data-topic="expresiones" data-message="Quiero aprender expresiones cotidianas en lenguaje de señas">
            <h5 class="topic-title">Expresiones</h5>
            <p class="topic-text">Frases y saludos del día a día para comunicarte fácilmente.</p>
        </button>
    </div>
</div>
{% endblock %}
